name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download Modules
        shell: pwsh
        run: go mod download

      - name: Test
        shell: pwsh
        run: go test ./... -count=1

      - name: Build
        shell: pwsh
        run: go build -v -ldflags="-s -w" -o WeSaver.exe .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: WeSaver.exe
